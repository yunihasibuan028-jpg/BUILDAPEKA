name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL ZIP project Flutter yang akan dibuild"
        required: true
      tag:
        description: "Tag unik untuk mencocokkan run ini dengan bot"
        required: true
      build_type:
        description: "release atau debug"
        required: false
        default: "release"

run-name: ${{ inputs.tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download project ZIP
        run: curl -L "${{ inputs.zip_url }}" -o project.zip

      - name: Extract project and locate pubspec.yaml
        run: |
          mkdir -p project
          unzip -q project.zip -d project
          PROJECT_DIR=$(dirname "$(find project -maxdepth 6 -iname pubspec.yaml | head -n 1)")
          if [ -z "$PROJECT_DIR" ] || [ "$PROJECT_DIR" = "." ]; then
            echo "::error::pubspec.yaml tidak ditemukan di dalam ZIP. Pastikan ZIP berisi project Flutter yang valid."
            exit 1
          fi
          echo "Project root ditemukan di: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Build APK (release)
        if: ${{ inputs.build_type == 'release' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --release

      - name: Build APK (debug)
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --debug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 1
